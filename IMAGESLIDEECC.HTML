<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Bootstrap Landing</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f8f8f8;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  padding:20px 40px;
}

.nav-link{
  font-size:14px;
  color:#666 !important;
}

.nav-link:hover{
  color:#000 !important;
}

/* BUTTONS */
.btn-black{
  background:#111;
  color:#fff;
  border-radius:30px;
  padding:10px 18px;
}

.btn-outline-custom{
  border:1px solid #ccc;
  border-radius:30px;
}

/* HERO */
.hero{
  padding:60px 40px;
}

/* LEFT */
.rating{
  background:rgba(0,200,100,0.1);
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}

.hero-title{
  font-size:clamp(32px,5vw,56px);
  font-weight:600;
  margin:20px 0;
  line-height:1.1;
}

.hero-list li{
  list-style:none;
  margin-bottom:10px;
  font-size:15px;
}

/* PRICE */
.price-box{
  display:flex;
  align-items:center;
  gap:20px;
  margin-top:20px;
  flex-wrap:wrap;
}

/* GLASS CARD */
.glass-card{
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* RIGHT MASONRY */
.masonry{
  display:flex;
  gap:20px;
  height:600px;
  overflow:hidden;
}

.column{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:20px;
  animation:scrollUp 18s linear infinite;
}

.column.reverse{
  animation:scrollDown 18s linear infinite;
}

.img-box{
  border-radius:20px;
  overflow:hidden;
  min-height:180px;
  position:relative;
  animation:float 6s ease-in-out infinite;
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}

.img-box:hover img{
  transform:scale(1.1);
}

/* ANIMATIONS */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

@keyframes scrollUp{
  0%{transform:translateY(0);}
  100%{transform:translateY(-50%);}
}

@keyframes scrollDown{
  0%{transform:translateY(-50%);}
  100%{transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:992px){
  .masonry{
    height:450px;
  }
}

@media(max-width:768px){
  .hero{
    padding:30px 20px;
  }

  .masonry{
    height:380px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-transparent">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="#">Logo</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="#">Weight Loss</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Strength</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Anti-Aging</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Hair Growth</a></li>
      </ul>

      <div class="d-flex gap-2">
        <button class="btn btn-black">Get Started</button>
        <button class="btn btn-outline-custom">Login</button>
      </div>

    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero container-fluid">
  <div class="row align-items-center g-5">

    <!-- LEFT -->
    <div class="col-lg-6">

      <div class="rating">⭐ 4.5 Rating • 453 Reviews</div>

      <h1 class="hero-title">
        Compounded<br>
        Semaglutide for<br>
        Weight Loss
      </h1>

      <ul class="hero-list p-0">
        <li>✔ Same ingredient as Wegovy®</li>
        <li>✔ No hidden fees</li>
        <li>✔ Free shipping</li>
      </ul>

      <div class="price-box">
        <h2 class="fw-bold">$296 <span class="text-muted fs-6">/mo</span></h2>
        <button class="btn btn-black">Get Started</button>
      </div>

      <div class="glass-card">
        <strong>Is This Right for You?</strong><br>
        <span class="text-muted">Find Out →</span>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-lg-6">

      <div class="masonry">

        <div class="column">
          <div class="img-box"><img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"></div>
          <div class="img-box"><img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9"></div>
          <div class="img-box"><img src="https://images.unsplash.com/photo-1612817288484-6f916006741a"></div>
        </div>

        <div class="column reverse">
          <div class="img-box"><img src="https://images.unsplash.com/photo-1581090700227-4c4b5e48ef73"></div>
          <div class="img-box"><img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348"></div>
          <div class="img-box"><img src="https://images.unsplash.com/photo-1556228720-195a672e8a03"></div>
        </div>

      </div>

    </div>

  </div>
</section>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- GSAP ANIMATION -->
<script>
gsap.from(".hero-title", {
  y: 50,
  opacity: 0,
  duration: 1
});

gsap.from(".hero-list li", {
  y: 20,
  opacity: 0,
  stagger: 0.2,
  delay: 0.5
});

gsap.from(".img-box", {
  scale: 0.9,
  opacity: 0,
  stagger: 0.1,
  duration: 1,
  delay: 0.3
});
</script>

</body>
</html>
