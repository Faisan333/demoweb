<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ERP Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0036;
  --secondary:#FF7F50;
  --dark:#1f2937;
  --light:#f4f4f4;
  --navbar:#fff;
  --sidebar:#2c2f41;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--light);
  color:#333;
}

/* NAVBAR */
.navbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  position:fixed;
  width:100%;
  top:0;
  background: var(--navbar);
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  z-index:100;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:16px;
}

.menu-btn{
  font-size:24px;
  background:none;
  border:none;
  cursor:pointer;
  display:none;
  color:#333;
}

.brand{
  font-weight:700;
  font-size:20px;
  color: var(--primary);
}

.user{
  font-size:14px;
  color:#333;
}

/* LAYOUT */
.layout{
  display:flex;
  margin-top:60px;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:220px;
  padding:24px 12px;
  background: var(--sidebar);
  color:#fff;
  transition:0.3s;
}

.sidebar a{
  display:block;
  padding:14px 16px;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  margin-bottom:12px;
  font-size:15px;
  font-weight:500;
  transition:0.2s;
}

.sidebar a.active,
.sidebar a:hover{
  background: var(--primary);
  color:#fff;
  transform: scale(1.02);
}

/* CONTENT */
.content{
  flex:1;
  background:#f9f9f9;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

/* MOBILE */
@media(max-width:768px){
  .menu-btn{display:block;}
  .sidebar{
    position:fixed;
    top:60px;
    left:-100%;
    height:calc(100vh - 60px);
    z-index:1000;
  }
  .sidebar.open{left:0;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="brand">
        DEMO ERP
    </div>
  </div>
  <div class="user">Admin</div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <a class="active">📊 Dashboard</a>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <iframe
      src="https://docs.google.com/spreadsheets/d/1-nnHrHZlA8lRkMB-c1NVEUOehjnbsIcZs0d3NHtAor4/edit?usp=sharing"
      allowfullscreen>
    </iframe>
  </div>

</div>

<script>
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
