<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="author" content="Muhammed Faisan">
	<link rel="shortcut icon" href="">

	<meta name="description" content="Four Bros Perfumes is a premium fragrance brand offering unique and captivating scents for every occasion." />
	<meta name="keywords" content="fourbrosperfumes, four Bros Perfumes,four Bros,perfumes" />

  <title>Coming Soon</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body, html {
      height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      font-size: 1.5em;
    }

    .countdown div {
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 20px;
      border-radius: 10px;
    }

    .countdown div span {
      display: block;
      font-size: 0.7em;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .subscribe {
      margin-top: 40px;
    }

    .subscribe input[type="email"] {
      padding: 10px;
      border: none;
      border-radius: 5px 0 0 5px;
      width: 250px;
    }

    .subscribe button {
      padding: 10px 20px;
      border: none;
      border-radius: 0 5px 5px 0;
      background: #ff7e5f;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2em;
      }

      .countdown {
        flex-direction: column;
        gap: 10px;
      }

      .subscribe input[type="email"] {
        width: 100%;
        border-radius: 5px;
        margin-bottom: 10px;
      }

      .subscribe button {
        width: 100%;
        border-radius: 5px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>Our website is under construction. Stay tuned!</p>

    <div class="countdown" id="countdown">
      <div><span id="days">0</span>Days</div>
      <div><span id="hours">0</span>Hours</div>
      <div><span id="minutes">0</span>Minutes</div>
      <div><span id="seconds">0</span>Seconds</div>
    </div>

    <div class="subscribe">
      <input type="email" placeholder="Enter your email" id="email">
      <button onclick="subscribe()">Notify Me</button>
    </div>
  </div>

  <script>
    // Set the launch date here
    const launchDate = new Date("2026-04-30T00:00:00").getTime();

    const countdown = setInterval(() => {
      const now = new Date().getTime();
      const distance = launchDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;

      if (distance < 0) {
        clearInterval(countdown);
        document.getElementById("countdown").innerHTML = "<p>We are Live!</p>";
      }
    }, 1000);

    function subscribe() {
      const email = document.getElementById("email").value;
      if(email) {
        alert(`Thank you! We will notify ${email} when we launch.`);
        document.getElementById("email").value = '';
      } else {
        alert("Please enter a valid email.");
      }
    }
  </script>

</body>
</html>
