<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viktor Oddy - Full Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
@font-face{font-family:'PP Neue Montreal';src:url('https://assets.website-files.com/6009ec8cda7f305645c9d91b/60176f9bb43e36419997ecfe_PPNeueMontreal-Book.otf')}
@font-face{font-family:'PP Mondwest';src:url('/PPMondwest-Regular.woff2')}

body{margin:0;background:#fff;color:#051A24;font-family:'PP Neue Montreal',sans-serif;overflow-x:hidden}
.serif{font-family:'PP Mondwest',serif}

.hero{max-width:440px;margin:auto;padding:60px 20px}

.btn-main{background:#051A24;color:#fff;border-radius:50px;padding:12px 28px;
box-shadow:0 1px 2px rgba(5,26,36,0.1),0 4px 4px rgba(5,26,36,0.09),0 9px 6px rgba(5,26,36,0.05),0 17px 7px rgba(5,26,36,0.01),inset 0 2px 8px rgba(255,255,255,0.5)}
.btn-light2{background:#fff;color:#051A24;border-radius:50px;padding:12px 28px;box-shadow:0 4px 30px rgba(0,0,0,0.08)}

.marquee{overflow:hidden}
.marquee-track{display:flex}
.marquee-track img{height:300px;margin:0 12px;border-radius:20px}

.fade{opacity:0;transform:translateY(30px)}

@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

.card{border-radius:40px;padding:40px}

.carousel-wrapper{overflow:hidden}
.carousel-track{display:flex;transition:transform .8s cubic-bezier(0.4,0,0.2,1)}
.test-card{width:400px;margin-right:20px}

.parallax{transition:transform 0.1s linear}

</style>
</head>
<body>

<!-- HERO -->
<section class="hero text-center">
<h1 class="serif fade" style="animation-delay:.1s">Viktor Oddy</h1>
<p class="fade" style="animation-delay:.2s">The creative studio of Viktor Oddy</p>
<h2 class="fade" style="animation-delay:.3s">
Build the <span class="serif">next wave</span>,<br>
the <span class="serif">bold way.</span>
</h2>
<div class="fade" style="animation-delay:.4s">
<p>I spent seven years at Apple crafting products used by over a billion people.</p>
<p>The studio is deliberately small.</p>
<p>Projects start at $5,000 per month.</p>
</div>
<div class="fade d-flex flex-column gap-3" style="animation-delay:.5s">
<button class="btn-main">Start a chat</button>
<button class="btn-light2">View projects</button>
</div>
</section>

<!-- MARQUEE -->
<div class="marquee my-5">
<div class="marquee-track" id="marquee"></div>
</div>

<!-- TESTIMONIAL PARALLAX -->
<section class="container text-center my-5">
<h2 class="serif fade">I left Apple to build the studio I always wanted</h2>
<img id="parallaxImg" class="parallax rounded" width="300" src="https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260330_103804_7aa5494f-4d5b-432e-9dc7-20715275f143.png&w=1280&q=85">
</section>

<!-- CAROUSEL -->
<section class="container my-5">
<div class="carousel-wrapper">
<div class="carousel-track" id="carousel"></div>
</div>
</section>

<script>
// FADE-IN OBSERVER
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
 if(e.isIntersecting){
  e.target.style.animation='fadeUp .8s forwards'
 }
})},{threshold:.1})

document.querySelectorAll('.fade').forEach(el=>observer.observe(el))

// MARQUEE LOOP
const imgs=[
"https://motionsites.ai/assets/hero-space-voyage-preview-eECLH3Yc.gif",
"https://motionsites.ai/assets/hero-portfolio-cosmic-preview-BpvWJ3Nc.gif",
"https://motionsites.ai/assets/hero-velorah-preview-CJNTtbpd.gif",
"https://motionsites.ai/assets/hero-asme-preview-B_nGDnTP.gif",
"https://motionsites.ai/assets/hero-transform-data-preview-Cx5OU29N.gif",
"https://motionsites.ai/assets/hero-aethera-preview-DknSlcTa.gif",
"https://motionsites.ai/assets/hero-orbit-web3-preview-BXt4OttD.gif",
"https://motionsites.ai/assets/hero-nexora-preview-cx5HmUgo.gif"
]
const track=document.getElementById('marquee')
const full=[...imgs,...imgs]
full.forEach(src=>{
 const img=document.createElement('img')
 img.src=src
 track.appendChild(img)
})
let x=0
function animateMarquee(){
 x-=0.3
 if(x<-track.scrollWidth/2)x=0
 track.style.transform=`translateX(${x}px)`
 requestAnimationFrame(animateMarquee)
}
animateMarquee()

// PARALLAX
const img=document.getElementById('parallaxImg')
window.addEventListener('scroll',()=>{
 const rect=img.getBoundingClientRect()
 const offset=(window.innerHeight-rect.top)*0.2
 img.style.transform=`translateY(${offset}px)`
})

// CAROUSEL
const data=[
"Amazing work","4x conversions","World class","Incredible","Perfect"
]
const carousel=document.getElementById('carousel')
let index=0

function render(){
 carousel.innerHTML=''
 data.concat(data).forEach(t=>{
  const div=document.createElement('div')
  div.className='test-card card'
  div.innerText=t
  carousel.appendChild(div)
 })
}
render()

function slide(){
 index++
 carousel.style.transform=`translateX(-${index*420}px)`
 if(index>data.length){index=0}
}
setInterval(slide,3000)

</script>

</body>
</html>
