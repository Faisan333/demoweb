<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Section</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: black;
      color: white;
      margin: 0;
      overflow-x: hidden;
    }

    video.bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.1) 80%, rgba(255,255,255,0.3) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .nav-wrapper {
      padding: 24px 24px 0;
    }

    @media (min-width: 768px) {
      .nav-wrapper { padding: 24px 48px 0; }
    }

    @media (min-width: 992px) {
      .nav-wrapper { padding: 24px 64px 0; }
    }

    .hero-container {
      padding: 0 24px 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    @media (min-width: 768px) {
      .hero-container { padding: 0 48px 48px; }
    }

    @media (min-width: 992px) {
      .hero-container { padding: 0 64px 64px; }
    }

    .hero-heading {
      font-size: 2.5rem;
      letter-spacing: -0.04em;
    }

    @media (min-width: 768px) {
      .hero-heading { font-size: 3rem; }
    }

    @media (min-width: 992px) {
      .hero-heading { font-size: 4rem; }
    }

    @media (min-width: 1200px) {
      .hero-heading { font-size: 5rem; }
    }

    .fade {
      opacity: 0;
      transition: opacity 1s ease;
    }

    .fade.show {
      opacity: 1;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateX(-18px);
      transition: all 0.5s ease;
    }

    .char.show {
      opacity: 1;
      transform: translateX(0);
    }

  </style>
</head>
<body>

  <!-- Video Background -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260403_050628_c4e32401-fab4-4a27-b7a8-6e9291cd5959.mp4" type="video/mp4">
  </video>

  <!-- Navbar -->
  <div class="nav-wrapper">
    <div class="liquid-glass rounded-3 px-3 py-2 d-flex justify-content-between align-items-center">
      <div class="fs-4 fw-semibold">VEX</div>

      <div class="d-none d-md-flex gap-4 small">
        <a href="#" class="text-white text-decoration-none">Story</a>
        <a href="#" class="text-white text-decoration-none">Investing</a>
        <a href="#" class="text-white text-decoration-none">Building</a>
        <a href="#" class="text-white text-decoration-none">Advisory</a>
      </div>

      <button class="btn btn-light btn-sm px-4">Start a Chat</button>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero-container">
    <div class="row align-items-end">
      <div class="col-lg-6">

        <h1 class="hero-heading mb-3" id="animatedText"></h1>

        <p class="text-secondary fade" id="subtext">
          We back visionaries and craft ventures that define what comes next.
        </p>

        <div class="d-flex gap-3 flex-wrap mt-3 fade" id="buttons">
          <button class="btn btn-light px-4 py-2">Start a Chat</button>
          <button class="btn text-white px-4 py-2 liquid-glass border border-light">
            Explore Now
          </button>
        </div>

      </div>

      <div class="col-lg-6 d-flex justify-content-lg-end mt-4 mt-lg-0">
        <div class="liquid-glass border border-light px-4 py-2 rounded-3 fade" id="tag">
          <span class="fs-5 fw-light">Investing. Building. Advisory.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const text = "Shaping tomorrow\nwith vision and action.";
    const container = document.getElementById("animatedText");
    const charDelay = 30;

    let totalDelay = 200;

    text.split("\n").forEach((line, lineIndex) => {
      const div = document.createElement("div");

      line.split("").forEach((char, charIndex) => {
        const span = document.createElement("span");
        span.className = "char";
        span.innerHTML = char === " " ? "&nbsp;" : char;

        const delay = totalDelay + (charIndex * charDelay);

        setTimeout(() => {
          span.classList.add("show");
        }, delay);

        div.appendChild(span);
      });

      container.appendChild(div);
      totalDelay += line.length * charDelay;
    });

    // Fade elements
    setTimeout(() => document.getElementById("subtext").classList.add("show"), 800);
    setTimeout(() => document.getElementById("buttons").classList.add("show"), 1200);
    setTimeout(() => document.getElementById("tag").classList.add("show"), 1400);
  </script>

</body>
</html>
