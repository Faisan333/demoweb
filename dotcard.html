<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Hotspots + Hover Color</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
}

/* CONTAINER */
.container {
  position: relative;
  max-width: 1200px;
  margin: 40px auto;
}

/* IMAGE */
.container img {
  width: 100%;
  border-radius: 12px;
}

/* DOT */
.dot {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #fff;
  border-radius: 50%;
  cursor: pointer;
  transform: translate(-50%, -50%);
}

.dot::before {
  content: "";
  position: absolute;
  width: 30px;
  height: 30px;
  border: 2px solid #fff;
  border-radius: 50%;
  top: -8px;
  left: -8px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0.6; }
  70% { transform: scale(1.2); opacity: 0; }
  100% { opacity: 0; }
}

/* CARD */
.card {
  position: absolute;
  width: 230px;
  background: #fff;
  border-radius: 14px;
  padding: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -120%) scale(0.9);
  transition: all 0.25s ease;
  z-index: 10;
}

.card.active {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -120%) scale(1);
}

/* CARD CONTENT */
.card img {
  width: 100%;
  border-radius: 10px;
}

.card h4 {
  margin: 10px 0 5px;
  color: #000;
}

.card p {
  margin: 0 0 10px;
  font-weight: bold;
  color: #000;
}

.card button {
  width: 100%;
  padding: 10px;
  background: black;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .card {
    width: 200px;
  }
}

/* CENTRAL TEXT + HOVER IMAGES */
.center-section {
  position: relative;
  text-align: center;
  margin: 60px 0;
}

.center-section h1 {
  font-size: 4em;
  z-index: 1;
  position: relative;
}

/* HOVER IMAGES */
.hover-image {
  width: 150px;
  height: 150px;
  object-fit: cover;
  filter: grayscale(100%);
  transition: filter 0.5s, transform 0.3s;
  position: absolute;
  border-radius: 10px;
}

.hover-image:hover {
  filter: grayscale(0%);
  transform: scale(1.1);
}

.top-left { top: -180px; left: -180px; }
.top-right { top: -180px; right: -180px; }
.bottom-left { bottom: -180px; left: -180px; }
.bottom-right { bottom: -180px; right: -180px; }

</style>
</head>

<body>

<!-- HOTSPOT CONTAINER -->
<div class="container">
  <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" alt="Product Background">

  <!-- DOTS -->
  <div class="dot" style="top:40%; left:25%;" data-id="1"></div>
  <div class="dot" style="top:65%; left:60%;" data-id="2"></div>
  <div class="dot" style="top:20%; left:75%;" data-id="3"></div>
  <div class="dot" style="top:80%; left:30%;" data-id="4"></div>

  <!-- CARDS -->
  <div class="card" id="card-1">
    <img src="https://images.unsplash.com/photo-1584865288642-42078afe6942">
    <h4>Active Joggers</h4>
    <p>$29</p>
    <button onclick="addToCart(1)">Add to Cart</button>
  </div>

  <div class="card" id="card-2">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
    <h4>Gym T-Shirt</h4>
    <p>$19</p>
    <button onclick="addToCart(2)">Add to Cart</button>
  </div>

  <div class="card" id="card-3">
    <img src="https://images.unsplash.com/photo-1600185368062-4c9b4b09f0b2">
    <h4>Running Shoes</h4>
    <p>$49</p>
    <button onclick="addToCart(3)">Add to Cart</button>
  </div>

  <div class="card" id="card-4">
    <img src="https://images.unsplash.com/photo-1618354695756-f5dcbb4d0c84">
    <h4>Sports Cap</h4>
    <p>$15</p>
    <button onclick="addToCart(4)">Add to Cart</button>
  </div>
</div>

<!-- CENTER SECTION WITH HOVER IMAGES -->
<div class="center-section">
  <img src="/mnt/data/image.png" class="hover-image top-left" alt="Top Left">
  <img src="/mnt/data/image.png" class="hover-image top-right" alt="Top Right">
  <img src="/mnt/data/image.png" class="hover-image bottom-left" alt="Bottom Left">
  <img src="/mnt/data/image.png" class="hover-image bottom-right" alt="Bottom Right">

  <h1>TAKE THE<br>FIRST STEP</h1>
</div>

<script>
/* HOTSPOT JS */
const dots = document.querySelectorAll('.dot');
const cards = document.querySelectorAll('.card');

/* CLOSE ALL */
function closeAll(){
  cards.forEach(c => c.classList.remove('active'));
}

/* SMART POSITION */
function positionCard(dot, card){
  const rect = dot.getBoundingClientRect();
  const parent = dot.parentElement.getBoundingClientRect();

  let top = rect.top - parent.top;
  let left = rect.left - parent.left;

  card.style.top = top + 'px';
  card.style.left = left + 'px';

  const cardRect = card.getBoundingClientRect();

  if(cardRect.right > window.innerWidth){
    card.style.left = (left - cardRect.width) + 'px';
  }

  if(cardRect.left < 0){
    card.style.left = (left + cardRect.width/2) + 'px';
  }

  if(cardRect.top < 0){
    card.style.transform = "translate(-50%, 20px) scale(1)";
  } else {
    card.style.transform = "translate(-50%, -120%) scale(1)";
  }
}

/* EVENTS */
dots.forEach(dot => {
  const id = dot.dataset.id;
  const card = document.getElementById('card-' + id);

  dot.addEventListener('mouseenter', () => {
    closeAll();
    card.classList.add('active');
    positionCard(dot, card);
  });

  dot.addEventListener('click', (e) => {
    e.stopPropagation();
    const isActive = card.classList.contains('active');
    closeAll();
    if(!isActive){
      card.classList.add('active');
      positionCard(dot, card);
    }
  });
});

document.addEventListener('click', closeAll);

cards.forEach(card => {
  card.addEventListener('click', e => e.stopPropagation());
});

function addToCart(id){
  alert("Product " + id + " added to cart");
}
</script>

</body>
</html>
