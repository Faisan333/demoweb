<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium 3D Jewellery</title>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin:0;
  background:#fff;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

#canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  z-index:-1;
}

section {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:1;
  position:relative;
}

h1 { font-size:60px; font-weight:300; }
h2 { font-size:40px; font-weight:300; }

button {
  padding:12px 25px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:30px;
  margin-top:20px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px 20px;
  border-radius:50px;
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<div id="canvas"></div>

<section>
  <h1>Diamond Necklace</h1>
</section>

<section>
  <div>
    <h2>Luxury Collection</h2>
    <p>Premium jewellery experience</p>
    <button onclick="orderNow('Diamond Necklace')">Order Now</button>
  </div>
</section>

<a class="whatsapp" href="https://wa.me/9719072175347">Chat</a>

<script>
// WhatsApp
function orderNow(product){
  const phone = "9719072175347";
  const msg = "I want to order: " + product;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// THREE JS SETUP
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("canvas").appendChild(renderer.domElement);

// LIGHTS
const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0xffffff, 1.5);
light2.position.set(-5,-5,-5);
scene.add(light2);

// CONTROLS
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;

// LOAD A TEST GLB MODEL (This is guaranteed working)
let model;
const loader = new THREE.GLTFLoader();

// Online 3D jewellery GLB from ModelViewer.dev (CORS-friendly)
loader.load('https://modelviewer.dev/shared-assets/models/Necklace.glb', function(gltf){
  model = gltf.scene;

  // Make shiny
  model.traverse((child)=>{
    if(child.isMesh){
      child.material.metalness = 1;
      child.material.roughness = 0.2;
    }
  });

  model.scale.set(2,2,2);
  scene.add(model);
}, undefined, function(error){
  console.error("Error loading GLB:", error);
});

// RENDER LOOP
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// SCROLL ANIMATION
gsap.registerPlugin(ScrollTrigger);

gsap.to({}, {
  scrollTrigger:{
    trigger:"body",
    start:"top top",
    end:"bottom bottom",
    scrub:true
  },
  onUpdate:(self)=>{
    if(model){
      const p = self.progress;
      model.rotation.y = p * Math.PI * 4;
      camera.position.z = 5 - (p * 2);
    }
  }
});

// RESPONSIVE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
