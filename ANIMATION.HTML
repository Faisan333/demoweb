<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agency Landing (Exact Animations)</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {margin:0;background:#000;color:#fff;font-family:'Barlow',sans-serif;overflow-x:hidden}
h1,h2,h3{font-family:'Instrument Serif',serif;font-style:italic}

.liquid-glass{background:rgba(255,255,255,0.01);backdrop-filter:blur(4px);border-radius:50px;position:relative}
.liquid-glass-strong{background:rgba(255,255,255,0.05);backdrop-filter:blur(40px);border-radius:50px}

.hero{height:1000px;position:relative;overflow:hidden}
.hero video{position:absolute;top:20%;width:100%;object-fit:contain}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.05)}
.gradient-bottom{position:absolute;bottom:0;height:300px;width:100%;background:linear-gradient(to bottom,transparent,black)}

.section{padding:120px 0;position:relative}
.video-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1}
.gradient-top{position:absolute;top:0;height:200px;width:100%;background:linear-gradient(to top,transparent,black)}
.gradient-bottom-2{position:absolute;bottom:0;height:200px;width:100%;background:linear-gradient(to bottom,transparent,black)}

.blur-word{display:inline-block;opacity:0;filter:blur(10px);transform:translateY(50px)}

.card-glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-radius:20px;border:1px solid rgba(255,255,255,0.2)}

</style>
</head>
<body>

<!-- NAV -->
<div class="position-fixed top-0 w-100 px-4 py-3 d-flex justify-content-between" style="z-index:1000">
<img src="logo-icon.png" width="48">
<div class="d-none d-md-flex liquid-glass px-2 py-1 align-items-center">
<a class="px-3">Home</a>
<a class="px-3">Services</a>
<a class="px-3">Work</a>
<a class="px-3">Process</a>
<a class="px-3">Pricing</a>
<button class="btn btn-light rounded-pill ms-2">Get Started</button>
</div>
</div>

<!-- HERO -->
<section class="hero text-center">
<video autoplay loop muted playsinline src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4"></video>
<div class="overlay"></div>
<div class="gradient-bottom"></div>

<div class="container position-relative" style="padding-top:150px">
<div class="liquid-glass px-3 py-1 d-inline-flex mb-4">
<span class="bg-white text-dark px-3 rounded-pill small me-2">New</span>
<span>Introducing AI-powered web design.</span>
</div>

<h1 id="blurText" class="display-1"></h1>

<p id="heroSub" class="mt-3 text-secondary">Stunning design. Blazing performance. Built by AI, refined by experts.</p>

<div id="heroBtns" class="mt-4">
<button class="liquid-glass-strong px-4 py-2 me-3">Get Started</button>
<button class="btn btn-outline-light">Watch the Film</button>
</div>
</div>
</section>

<!-- START SECTION (HLS) -->
<section class="section text-center">
<video id="hlsVideo1" class="video-bg" muted playsinline></video>
<div class="gradient-top"></div>
<div class="gradient-bottom-2"></div>
<div class="container">
<h2>You dream it. We ship it.</h2>
</div>
</section>

<!-- STATS -->
<section class="section text-center">
<video id="hlsVideo2" class="video-bg" muted playsinline style="filter:saturate(0)"></video>
<div class="gradient-top"></div>
<div class="gradient-bottom-2"></div>
<div class="container">
<div class="card-glass p-5">
<div class="row">
<div class="col">200+</div>
<div class="col">98%</div>
<div class="col">3.2x</div>
<div class="col">5 days</div>
</div>
</div>
</div>
</section>

<script>
// BLUR TEXT EXACT
const text = "The Website Your Brand Deserves";
const container = document.getElementById("blurText");
text.split(" ").forEach((word,i)=>{
 const span=document.createElement("span");
 span.className="blur-word me-2";
 span.innerText=word;
 container.appendChild(span);

 gsap.to(span,{
  opacity:1,
  filter:'blur(0px)',
  y:0,
  delay:i*0.1,
  duration:0.6
 });
});

// HERO ANIMATIONS
gsap.from("#heroSub",{opacity:0,y:20,filter:'blur(10px)',delay:0.8,duration:0.6});
gsap.from("#heroBtns",{opacity:0,y:20,filter:'blur(10px)',delay:1.1,duration:0.6});

// HLS VIDEO INIT
function initHLS(videoId,src){
 const video=document.getElementById(videoId);
 if(Hls.isSupported()){
  const hls=new Hls();
  hls.loadSource(src);
  hls.attachMedia(video);
  video.play();
 } else {
  video.src=src;
 }
}

initHLS("hlsVideo1","https://stream.mux.com/9JXDljEVWYwWu01PUkAemafDugK89o01BR6zqJ3aS9u00A.m3u8");
initHLS("hlsVideo2","https://stream.mux.com/NcU3HlHeF7CUL86azTTzpy3Tlb00d6iF3BmCdFslMJYM.m3u8");

</script>

</body>
</html>
